<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cccccccharles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #003CFF;
        }

        .fill {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .row {
            white-space: nowrap;
            line-height: 1.1;
            font-size: 3vw;
            font-weight: 700;
            color: #00cc76;
            letter-spacing: 0.05em;
            opacity: 0.1;
            will-change: opacity, transform;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="fill" id="fill"></div>
    <script>
        function fill() {
            const container = document.getElementById('fill');
            const word = 'cccccccharles ';
            const fontSize = window.innerWidth * 0.03;
            const lineHeight = fontSize * 1.1;
            const rows = Math.ceil(window.innerHeight / lineHeight) + 1;
            const charsPerRow = Math.ceil(window.innerWidth / (fontSize * 0.65)) + 20;
            const repeats = Math.ceil(charsPerRow / word.length) + 4;

            // Measure word width precisely using getBoundingClientRect
            const measure = document.createElement('span');
            measure.className = 'row';
            measure.style.cssText = 'position:absolute;visibility:hidden;animation:none;opacity:1;';
            measure.textContent = word;
            container.appendChild(measure);
            const wordWidth = measure.getBoundingClientRect().width;
            container.removeChild(measure);

            // Scroll by multiple words so the loop point is very infrequent
            const scrollWords = 5;
            const scrollDist = wordWidth * scrollWords;
            const pixelsPerSecond = 30;
            const scrollDuration = scrollDist / pixelsPerSecond;

            container.innerHTML = '';
            for (let i = 0; i < rows; i++) {
                const div = document.createElement('div');
                div.className = 'row';
                div.style.animation = 'pulse 3s ease-in-out ' + (i * 0.15) + 's infinite, scroll ' + scrollDuration + 's linear infinite';
                const baseOffset = i % 2 === 1 ? -(wordWidth / 2) : 0;
                div.style.marginLeft = (baseOffset - scrollDist) + 'px';
                div.style.setProperty('--scroll-dist', scrollDist + 'px');
                div.textContent = word.repeat(repeats + scrollWords + 2);
                container.appendChild(div);
            }

            // Inject the scroll keyframes with the measured word width
            let styleEl = document.getElementById('scroll-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'scroll-style';
                document.head.appendChild(styleEl);
            }
            styleEl.textContent = '@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(var(--scroll-dist)); } }';
        }

        document.fonts.ready.then(function() {
            fill();
        });
        window.addEventListener('resize', fill);
    </script>
</body>
</html>
