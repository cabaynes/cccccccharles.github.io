<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cccccccharles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #003CFF;
        }

        .fill {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        .row {
            white-space: nowrap;
            line-height: 1.1;
            font-size: clamp(12px, 2vw, 24px);
            font-weight: 700;
            color: #00cc76;
            letter-spacing: 0.05em;
            opacity: 0.1;
            will-change: opacity, transform;
            animation: pulse 3s ease-in-out infinite;
        }

        .linkedin {
            color: red;
            text-decoration: none;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="fill" id="fill"></div>
    <script>
        function fill() {
            const container = document.getElementById('fill');
            const word = 'cccccccharles ';

            // Measure actual rendered word size (respects clamp())
            const measure = document.createElement('span');
            measure.className = 'row';
            measure.style.cssText = 'position:absolute;visibility:hidden;animation:none;opacity:1;';
            measure.textContent = word;
            container.appendChild(measure);
            const wordWidth = measure.getBoundingClientRect().width;
            const rowHeight = measure.getBoundingClientRect().height;
            container.removeChild(measure);

            const rows = Math.ceil(window.innerHeight / rowHeight) + 2;
            const visibleWordsPerRow = Math.ceil(window.innerWidth / wordWidth) + 4;
            const repeats = visibleWordsPerRow;

            const scrollWords = 20;
            const scrollDist = wordWidth * scrollWords;

            const totalWords = repeats + scrollWords + 2;
            const specialRow = 4 + Math.floor(Math.random() * Math.min(20, rows - 4));
            // How many words fit on screen at once
            const visibleWords = Math.ceil(window.innerWidth / wordWidth) + 1;
            const link = '<a class="linkedin" href="https://www.linkedin.com/in/cabaynes">cccccccharles </a>';

            container.innerHTML = '';
            for (let i = 0; i < rows; i++) {
                const div = document.createElement('div');
                div.className = 'row';
                const scrollDuration = 100 + (i % 3) * 25;
                div.style.animation = 'pulse 3s ease-in-out ' + (i * 0.15) + 's infinite, scroll ' + scrollDuration + 's linear infinite';
                const baseOffset = i % 2 === 1 ? -(wordWidth / 2) : 0;
                div.style.marginLeft = (baseOffset - scrollDist) + 'px';
                div.style.setProperty('--scroll-dist', scrollDist + 'px');
                if (i === specialRow) {
                    // Place a red link every visibleWords words, starting at the scroll offset
                    // so the first one appears near the left edge of the visible area
                    const firstLink = scrollWords + Math.floor(Math.random() * 3);
                    let html = '';
                    for (let j = 0; j < totalWords; j++) {
                        if (j >= firstLink && (j - firstLink) % visibleWords === 0) {
                            html += link;
                        } else {
                            html += word;
                        }
                    }
                    div.innerHTML = html;
                } else {
                    div.textContent = word.repeat(totalWords);
                }
                container.appendChild(div);
            }

            // Inject the scroll keyframes with the measured word width
            let styleEl = document.getElementById('scroll-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'scroll-style';
                document.head.appendChild(styleEl);
            }
            styleEl.textContent = '@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(var(--scroll-dist)); } }';
        }

        document.fonts.ready.then(function() {
            fill();
        });
        window.addEventListener('resize', fill);
    </script>
</body>
</html>
