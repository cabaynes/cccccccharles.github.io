<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cccccccharles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #003CFF;
        }

        .fill {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .row {
            white-space: nowrap;
            line-height: 1.1;
            font-size: 3vw;
            font-weight: 700;
            color: #00cc76;
            letter-spacing: 0.05em;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="fill" id="fill"></div>
    <script>
        function fill() {
            const container = document.getElementById('fill');
            const word = 'cccccccharles ';
            const fontSize = window.innerWidth * 0.03;
            const lineHeight = fontSize * 1.1;
            const rows = Math.ceil(window.innerHeight / lineHeight) + 1;
            const charsPerRow = Math.ceil(window.innerWidth / (fontSize * 0.65)) + 20;
            const repeats = Math.ceil(charsPerRow / word.length) + 2;

            container.innerHTML = '';
            for (let i = 0; i < rows; i++) {
                const div = document.createElement('div');
                div.className = 'row';
                div.style.animationDelay = (i * 0.15) + 's';
                div.textContent = word.repeat(repeats);
                container.appendChild(div);
            }
        }

        fill();
        window.addEventListener('resize', fill);
    </script>
</body>
</html>
